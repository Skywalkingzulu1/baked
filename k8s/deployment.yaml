apiVersion: apps/v1
kind: Deployment
metadata:
  name: bud-credit-form
  labels:
    app: bud-credit-form
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bud-credit-form
  template:
    metadata:
      labels:
        app: bud-credit-form
    spec:
      containers:
        - name: bud-credit-form
          image: your-docker-repo/bud-credit-form:latest
          ports:
            - containerPort: 5000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bud-credit-secret
                  key: SECRET_KEY
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2