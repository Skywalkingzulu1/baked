<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baked | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Password" class="w-full p-3 rounded bg-gray-700 border border-gray-600 mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">Login</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Invalid Credentials</p>
        </div>
    </div>

    <div id="dashboard" class="container mx-auto p-6 hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    Baked Admin
                </h1>
                <p class="text-gray-400">Credit Submission Management</p>
            </div>
            <div class="space-x-4">
                <button onclick="location.href='/api/admin/export'" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-lg font-bold transition">
                    Export CSV
                </button>
                <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg font-bold transition text-gray-300">
                    Logout
                </button>
            </div>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl overflow-x-auto">
            <table id="submissionsTable" class="display w-full text-sm">
                <thead>
                    <tr class="text-left text-gray-400 border-b border-gray-700">
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Date</th>
                        <th>Cost</th>
                        <th>Remaining</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function attemptLogin() {
            const password = document.getElementById('admin-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (res.ok) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function loadData() {
            const res = await fetch('/api/admin/submissions');
            if (res.status === 401) return logout();
            
            const data = await res.json();
            const table = $('#submissionsTable').DataTable();
            table.clear();

            data.forEach(row => {
                table.row.add([
                    row.id,
                    row.name,
                    row.phone,
                    row.submission_date,
                    `$${row.cost}`,
                    `$${row.remaining}`,
                    new Date(row.created_at).toLocaleString()
                ]);
            });
            table.draw();
        }

        function logout() {
            document.cookie = "admin_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            location.reload();
        }

        // Auto-load check
        window.onload = async () => {
            const res = await fetch('/api/admin/submissions');
            if (res.ok) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            }
        };
    </script>

    <style>
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_processing, .dataTables_wrapper .dataTables_paginate {
            color: #9ca3af !important;
        }
        table.dataTable tbody tr {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-bottom: 1px solid #374151 !important;
        }
        .dataTables_wrapper .dataTables_filter input {
            background-color: #374151 !important;
            border: 1px solid #4b5563 !important;
            color: white !important;
            border-radius: 8px;
            padding: 4px 8px;
        }
    </script>
</body>
</html>
