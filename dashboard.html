<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baked | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">Baked Finance</h1>
            <div class="flex items-center space-x-6">
                <span id="user-name" class="text-gray-400">Loading...</span>
                <button onclick="logout()" class="text-sm bg-red-600 hover:bg-red-700 px-4 py-1 rounded transition">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left: Stats & Profile -->
        <div class="lg:col-span-1 space-y-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-emerald-400">Credit IQ Summary</h2>
                <div class="space-y-4">
                    <div class="flex justify-between">
                        <span class="text-gray-400">Total Utilization</span>
                        <span id="stat-util" class="font-bold">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Avg Submission</span>
                        <span id="stat-avg" class="font-bold">$0.00</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2.5">
                        <div id="util-progress" class="bg-blue-600 h-2.5 rounded-full" style="width: 45%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4">Submission Insight</h2>
                <canvas id="creditChart"></canvas>
            </div>
        </div>

        <!-- Right: Recent Activity -->
        <div class="lg:col-span-2">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl min-h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Your History</h2>
                    <button onclick="location.href='/'" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-bold transition">New Submission</button>
                </div>
                <div id="history-list" class="space-y-4">
                    <!-- Loaded via JS -->
                    <div class="text-center text-gray-500 py-20">No history found. Start by adding your first credit submission!</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function loadDashboard() {
            const res = await fetch('/api/user/data'); // We need to add this endpoint to app.py
            if (!res.ok) window.location.href = '/';
            
            const data = await res.json();
            document.getElementById('user-name').innerText = data.user.full_name;
            
            const list = document.getElementById('history-list');
            if (data.submissions.length > 0) {
                list.innerHTML = '';
                data.submissions.forEach(sub => {
                    const item = document.createElement('div');
                    item.className = "bg-gray-700 p-4 rounded-lg flex justify-between items-center border-l-4 border-emerald-500";
                    item.innerHTML = `
                        <div>
                            <p class="font-bold text-lg">${sub.name}</p>
                            <p class="text-sm text-gray-400">${new Date(sub.submission_date).toLocaleDateString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-mono text-emerald-400">$${sub.cost}</p>
                            <p class="text-xs text-gray-500">Remaining: $${sub.remaining}</p>
                        </div>
                    `;
                    list.appendChild(item);
                });
                renderChart(data.submissions);
            }
        }

        function renderChart(subs) {
            const ctx = document.getElementById('creditChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: subs.map(s => s.submission_date).reverse(),
                    datasets: [{
                        label: 'Submission Cost',
                        data: subs.map(s => s.cost).reverse(),
                        borderColor: '#3b82f6',
                        tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function logout() {
            document.cookie = "auth_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            location.reload();
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
