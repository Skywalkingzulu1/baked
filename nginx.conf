# ------------------------------------------------------------
# Nginx configuration for serving the static site with caching
# headers and HTTPS support.
# ------------------------------------------------------------

server {
    # Listen on HTTP and HTTPS (SSL) ports.
    listen 80;
    listen 443 ssl http2;
    server_name _;   # Catch‑all server name.

    # --------------------------------------------------------
    # SSL configuration
    # --------------------------------------------------------
    # NOTE: Replace the following self‑signed certificate paths
    # with your own certificates for production use.
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    # Recommended SSL settings.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --------------------------------------------------------
    # Security headers
    # --------------------------------------------------------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline'";

    # --------------------------------------------------------
    # Caching for static assets
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------
    # Default location – serve files from the document root
    # --------------------------------------------------------
    location / {
        # Try to serve the exact file, otherwise fallback to index.html
        try_files $uri $uri/ /index.html =404;
    }
}